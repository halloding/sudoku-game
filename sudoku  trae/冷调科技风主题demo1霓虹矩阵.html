<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷调科技风 - 方案一：霓虹矩阵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', 'Microsoft YaHei', monospace;
            overflow: hidden;
            position: relative;
            background: #0D1117;
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .matrix-column {
            position: absolute;
            top: -100%;
            width: 2px;
            background: linear-gradient(180deg, transparent, #00E5FF, transparent);
            animation: matrix-fall 8s linear infinite;
            opacity: 0.6;
        }

        @keyframes matrix-fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(200vh); }
        }

        .matrix-column:nth-child(1) { left: 5%; animation-delay: 0s; height: 40%; }
        .matrix-column:nth-child(2) { left: 12%; animation-delay: 1s; height: 50%; }
        .matrix-column:nth-child(3) { left: 19%; animation-delay: 2s; height: 35%; }
        .matrix-column:nth-child(4) { left: 26%; animation-delay: 0.5s; height: 45%; }
        .matrix-column:nth-child(5) { left: 33%; animation-delay: 1.5s; height: 55%; }
        .matrix-column:nth-child(6) { left: 40%; animation-delay: 2.5s; height: 38%; }
        .matrix-column:nth-child(7) { left: 47%; animation-delay: 0.8s; height: 48%; }
        .matrix-column:nth-child(8) { left: 54%; animation-delay: 1.8s; height: 42%; }
        .matrix-column:nth-child(9) { left: 61%; animation-delay: 2.8s; height: 52%; }
        .matrix-column:nth-child(10) { left: 68%; animation-delay: 0.3s; height: 36%; }
        .matrix-column:nth-child(11) { left: 75%; animation-delay: 1.3s; height: 46%; }
        .matrix-column:nth-child(12) { left: 82%; animation-delay: 2.3s; height: 40%; }
        .matrix-column:nth-child(13) { left: 89%; animation-delay: 0.6s; height: 50%; }
        .matrix-column:nth-child(14) { left: 96%; animation-delay: 1.6s; height: 44%; }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(180deg, transparent, rgba(0, 229, 255, 0.4), transparent);
            pointer-events: none;
            z-index: 3;
            animation: scanline-move 4s linear infinite;
        }

        @keyframes scanline-move {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        .corner-frame {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 4;
        }

        .corner-frame::before,
        .corner-frame::after {
            content: '';
            position: absolute;
            background: #00E5FF;
            box-shadow: 0 0 10px #00E5FF, 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .corner-frame.top-left {
            top: 25px;
            left: 25px;
        }
        .corner-frame.top-left::before {
            width: 50px;
            height: 3px;
            top: 0;
            left: 0;
        }
        .corner-frame.top-left::after {
            width: 3px;
            height: 50px;
            top: 0;
            left: 0;
        }

        .corner-frame.top-right {
            top: 25px;
            right: 25px;
        }
        .corner-frame.top-right::before {
            width: 50px;
            height: 3px;
            top: 0;
            right: 0;
        }
        .corner-frame.top-right::after {
            width: 3px;
            height: 50px;
            top: 0;
            right: 0;
        }

        .corner-frame.bottom-left {
            bottom: 25px;
            left: 25px;
        }
        .corner-frame.bottom-left::before {
            width: 50px;
            height: 3px;
            bottom: 0;
            left: 0;
        }
        .corner-frame.bottom-left::after {
            width: 3px;
            height: 50px;
            bottom: 0;
            left: 0;
        }

        .corner-frame.bottom-right {
            bottom: 25px;
            right: 25px;
        }
        .corner-frame.bottom-right::before {
            width: 50px;
            height: 3px;
            bottom: 0;
            right: 0;
        }
        .corner-frame.bottom-right::after {
            width: 3px;
            height: 50px;
            bottom: 0;
            right: 0;
        }

        .tech-particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #00E5FF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 10px #00E5FF, 0 0 20px rgba(0, 229, 255, 0.5);
            animation: particle-float 5s ease-in-out infinite;
        }

        .tech-particle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
        .tech-particle:nth-child(2) { top: 40%; right: 18%; animation-delay: 1s; }
        .tech-particle:nth-child(3) { top: 60%; left: 12%; animation-delay: 2s; }
        .tech-particle:nth-child(4) { top: 30%; right: 25%; animation-delay: 3s; }
        .tech-particle:nth-child(5) { top: 70%; left: 20%; animation-delay: 4s; }

        @keyframes particle-float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            25% { transform: translate(15px, -10px) scale(1.2); opacity: 1; }
            50% { transform: translate(-10px, 15px) scale(1); opacity: 0.8; }
            75% { transform: translate(10px, 5px) scale(1.1); opacity: 1; }
        }

        .data-stream {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .stream-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.6), transparent);
            animation: stream-flow 6s linear infinite;
        }

        .stream-line:nth-child(1) { top: 15%; width: 40%; animation-delay: 0s; }
        .stream-line:nth-child(2) { top: 35%; width: 50%; animation-delay: 1.5s; }
        .stream-line:nth-child(3) { top: 55%; width: 35%; animation-delay: 3s; }
        .stream-line:nth-child(4) { top: 75%; width: 45%; animation-delay: 4.5s; }

        @keyframes stream-flow {
            0% { left: -50%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 110%; opacity: 0; }
        }

        .game-container {
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.98));
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 92%;
            box-shadow: 
                0 0 30px rgba(0, 229, 255, 0.15),
                0 0 60px rgba(79, 195, 247, 0.1),
                inset 0 2px 0 rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 229, 255, 0.3);
            position: relative;
            z-index: 10;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 15%;
            right: 15%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00E5FF, transparent);
            animation: border-pulse 3s ease-in-out infinite;
        }

        @keyframes border-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .game-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.08) 0%, transparent 50%, rgba(79, 195, 247, 0.08) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #00E5FF;
            margin-bottom: 30px;
            letter-spacing: 8px;
            text-shadow: 
                0 0 10px rgba(0, 229, 255, 0.8),
                0 0 20px rgba(0, 229, 255, 0.5),
                0 0 30px rgba(0, 229, 255, 0.3);
            animation: title-glow 2.5s ease-in-out infinite;
        }

        .title span {
            color: #4FC3F7;
            text-shadow: 
                0 0 10px rgba(79, 195, 247, 0.8),
                0 0 20px rgba(79, 195, 247, 0.5);
        }

        @keyframes title-glow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(0, 229, 255, 0.8), 0 0 20px rgba(0, 229, 255, 0.5); 
            }
            50% { 
                text-shadow: 0 0 15px rgba(79, 195, 247, 1), 0 0 30px rgba(79, 195, 247, 0.7); 
            }
        }

        .demo-box {
            padding: 30px;
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.9), rgba(13, 17, 23, 0.95));
            border-radius: 10px;
            border: 2px solid rgba(0, 229, 255, 0.25);
            text-align: center;
            color: #C9D1D9;
            font-size: 15px;
        }

        .scheme-name {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #00E5FF;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(0, 229, 255, 0.08);
            border-radius: 8px;
            border: 2px solid rgba(0, 229, 255, 0.3);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
            letter-spacing: 3px;
        }
        
        .demo-box p {
            margin: 16px 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="data-stream">
        <div class="stream-line"></div>
        <div class="stream-line"></div>
        <div class="stream-line"></div>
        <div class="stream-line"></div>
    </div>
    
    <div class="matrix-bg">
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
        <div class="matrix-column"></div>
    </div>
    
    <div class="grid-overlay"></div>
    <div class="scanline"></div>
    
    <div class="corner-frame top-left"></div>
    <div class="corner-frame top-right"></div>
    <div class="corner-frame bottom-left"></div>
    <div class="corner-frame bottom-right"></div>
    
    <div class="tech-particle"></div>
    <div class="tech-particle"></div>
    <div class="tech-particle"></div>
    <div class="tech-particle"></div>
    <div class="tech-particle"></div>

    <div class="game-container">
        <h1 class="title">SUDOKU</h1>
        <div class="scheme-name">⬡ 方案一：霓虹矩阵 ⬡</div>
        <div class="demo-box">
            <p>⬛ 矩阵雨下落</p>
            <p>⬜ 网格叠加背景</p>
            <p>⚡ 扫描线移动</p>
            <p>⬡ 科技粒子浮动</p>
            <p>〰️ 数据流横向流动</p>
        </div>
    </div>
</body>
</html>
