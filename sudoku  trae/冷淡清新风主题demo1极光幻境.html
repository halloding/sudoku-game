<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷淡清新风 - 方案一：极光幻境</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .aurora-layer {
            position: absolute;
            width: 200%;
            height: 100%;
            top: 0;
            left: -50%;
            animation: aurora-sway 15s ease-in-out infinite;
        }

        .aurora-layer:nth-child(1) {
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(96, 165, 250, 0.3) 20%, 
                rgba(147, 197, 253, 0.2) 40%, 
                transparent 60%);
            animation-delay: 0s;
        }

        .aurora-layer:nth-child(2) {
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(167, 139, 250, 0.25) 25%, 
                rgba(196, 181, 253, 0.15) 45%, 
                transparent 65%);
            animation-delay: -5s;
            animation-duration: 18s;
        }

        .aurora-layer:nth-child(3) {
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(52, 211, 153, 0.2) 30%, 
                rgba(110, 231, 183, 0.12) 50%, 
                transparent 70%);
            animation-delay: -10s;
            animation-duration: 20s;
        }

        @keyframes aurora-sway {
            0%, 100% { 
                transform: translateX(-5%) rotate(-2deg); 
                opacity: 0.8; 
            }
            33% { 
                transform: translateX(5%) rotate(2deg); 
                opacity: 1; 
            }
            66% { 
                transform: translateX(-3%) rotate(-1deg); 
                opacity: 0.9; 
            }
        }

        .star-dust {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #e2e8f0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            animation: dust-float 8s ease-in-out infinite;
        }

        @keyframes dust-float {
            0%, 100% { 
                transform: translateY(0) translateX(0); 
                opacity: 0.3; 
            }
            50% { 
                transform: translateY(-20px) translateX(10px); 
                opacity: 0.8; 
            }
        }

        .star-dust:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; width: 2px; height: 2px; }
        .star-dust:nth-child(2) { top: 25%; left: 80%; animation-delay: 1s; }
        .star-dust:nth-child(3) { top: 40%; left: 25%; animation-delay: 2s; width: 4px; height: 4px; }
        .star-dust:nth-child(4) { top: 60%; left: 70%; animation-delay: 3s; }
        .star-dust:nth-child(5) { top: 75%; left: 15%; animation-delay: 4s; width: 2px; height: 2px; }
        .star-dust:nth-child(6) { top: 85%; left: 85%; animation-delay: 5s; }
        .star-dust:nth-child(7) { top: 20%; left: 50%; animation-delay: 0.5s; }
        .star-dust:nth-child(8) { top: 50%; left: 5%; animation-delay: 1.5s; width: 3px; height: 3px; }
        .star-dust:nth-child(9) { top: 70%; left: 55%; animation-delay: 2.5s; }
        .star-dust:nth-child(10) { top: 35%; left: 90%; animation-delay: 3.5s; width: 2px; height: 2px; }

        .aurora-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
            animation: orb-pulse 10s ease-in-out infinite;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .aurora-orb:nth-child(1) {
            top: 20%;
            left: 20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.4) 0%, transparent 70%);
        }
        .aurora-orb:nth-child(2) {
            top: 60%;
            right: 15%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.35) 0%, transparent 70%);
            animation-delay: -4s;
        }
        .aurora-orb:nth-child(3) {
            bottom: 20%;
            left: 40%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.3) 0%, transparent 70%);
            animation-delay: -7s;
        }

        .game-container {
            background: linear-gradient(145deg, rgba(248, 250, 252, 0.9), rgba(241, 245, 249, 0.85));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 92%;
            box-shadow: 
                0 8px 32px rgba(15, 23, 42, 0.15),
                0 1px 3px rgba(15, 23, 42, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 0 60px rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.3);
            position: relative;
            z-index: 10;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1) 0%, transparent 50%, rgba(167, 139, 250, 0.1) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 300;
            color: #334155;
            margin-bottom: 30px;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399, #60a5fa);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: title-aurora 6s ease-in-out infinite;
        }

        @keyframes title-aurora {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .demo-box {
            padding: 30px;
            background: linear-gradient(145deg, rgba(248, 250, 252, 0.95), rgba(241, 245, 249, 0.9));
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            text-align: center;
            color: #475569;
            font-size: 15px;
        }

        .scheme-name {
            text-align: center;
            font-size: 20px;
            font-weight: 400;
            color: #475569;
            margin-bottom: 24px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1), rgba(167, 139, 250, 0.08));
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            letter-spacing: 3px;
        }
        
        .demo-box p {
            margin: 16px 0;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="aurora-layer"></div>
        <div class="aurora-layer"></div>
        <div class="aurora-layer"></div>
    </div>
    
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    <div class="aurora-orb"></div>
    
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>
    <div class="star-dust"></div>

    <div class="game-container">
        <h1 class="title">数独</h1>
        <div class="scheme-name">🌌 方案一：极光幻境 🌌</div>
        <div class="demo-box">
            <p>🌊 极光彩带摇曳</p>
            <p>✨ 星尘点点飘浮</p>
            <p>🔮 柔和光团脉动</p>
            <p>🌙 深邃夜空背景</p>
            <p>💫 渐变色彩流动</p>
        </div>
    </div>
</body>
</html>
