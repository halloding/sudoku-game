<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活力游戏风 - 方案三：星空嘉年华</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', 'PingFang SC', sans-serif;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #0F0C29 0%, #302B63 50%, #24243E 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .star:nth-child(1) { width: 3px; height: 3px; top: 10%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { width: 2px; height: 2px; top: 18%; left: 35%; animation-delay: 0.3s; }
        .star:nth-child(3) { width: 4px; height: 4px; top: 8%; left: 55%; animation-delay: 0.6s; }
        .star:nth-child(4) { width: 2px; height: 2px; top: 22%; left: 75%; animation-delay: 0.9s; }
        .star:nth-child(5) { width: 3px; height: 3px; top: 5%; left: 90%; animation-delay: 1.2s; }
        .star:nth-child(6) { width: 4px; height: 4px; top: 30%; left: 10%; animation-delay: 1.5s; }
        .star:nth-child(7) { width: 2px; height: 2px; top: 40%; left: 25%; animation-delay: 0.2s; }
        .star:nth-child(8) { width: 3px; height: 3px; top: 35%; left: 45%; animation-delay: 0.5s; }
        .star:nth-child(9) { width: 4px; height: 4px; top: 45%; left: 65%; animation-delay: 0.8s; }
        .star:nth-child(10) { width: 2px; height: 2px; top: 32%; left: 85%; animation-delay: 1.1s; }
        .star:nth-child(11) { width: 3px; height: 3px; top: 55%; left: 20%; animation-delay: 1.4s; }
        .star:nth-child(12) { width: 4px; height: 4px; top: 65%; left: 40%; animation-delay: 1.7s; }
        .star:nth-child(13) { width: 2px; height: 2px; top: 60%; left: 60%; animation-delay: 0.1s; }
        .star:nth-child(14) { width: 3px; height: 3px; top: 70%; left: 80%; animation-delay: 0.4s; }
        .star:nth-child(15) { width: 4px; height: 4px; top: 75%; left: 12%; animation-delay: 0.7s; }
        .star:nth-child(16) { width: 2px; height: 2px; top: 85%; left: 32%; animation-delay: 1.0s; }
        .star:nth-child(17) { width: 3px; height: 3px; top: 80%; left: 52%; animation-delay: 1.3s; }
        .star:nth-child(18) { width: 4px; height: 4px; top: 88%; left: 72%; animation-delay: 1.6s; }
        .star:nth-child(19) { width: 2px; height: 2px; top: 92%; left: 88%; animation-delay: 0.9s; }
        .star:nth-child(20) { width: 3px; height: 3px; top: 50%; left: 8%; animation-delay: 1.2s; }

        .shooting-star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border-radius: 50%;
            box-shadow: 0 0 10px #FFD700, 0 0 20px #FFA500, 0 0 30px #FF6347;
            animation: shoot 4s ease-in-out infinite;
            z-index: 2;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.8), transparent);
            transform: translateX(-100px) rotate(35deg);
        }

        .shooting-star:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 25%; left: 60%; animation-delay: 1.5s; }
        .shooting-star:nth-child(3) { top: 45%; left: 30%; animation-delay: 3s; }

        @keyframes shoot {
            0% { opacity: 0; transform: translate(0, 0); }
            5% { opacity: 1; }
            30% { opacity: 1; transform: translate(300px, 200px); }
            35%, 100% { opacity: 0; transform: translate(350px, 230px); }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora-layer {
            position: absolute;
            width: 200%;
            height: 50%;
            bottom: 0;
            left: -50%;
            opacity: 0.4;
            animation: aurora-sway 10s ease-in-out infinite;
        }

        .aurora-layer:nth-child(1) {
            background: linear-gradient(0deg, transparent, #8B5CF6, #A855F7, transparent);
            animation-delay: 0s;
        }
        .aurora-layer:nth-child(2) {
            background: linear-gradient(0deg, transparent, #EC4899, #F472B6, transparent);
            animation-delay: -3s;
            height: 40%;
        }
        .aurora-layer:nth-child(3) {
            background: linear-gradient(0deg, transparent, #06B6D4, #22D3EE, transparent);
            animation-delay: -6s;
            height: 35%;
        }

        @keyframes aurora-sway {
            0%, 100% { transform: translateX(-20%) skewX(-5deg); }
            50% { transform: translateX(20%) skewX(5deg); }
        }

        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 3;
        }

        .firework-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: explode 2s ease-out infinite;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .firework-1 { top: 20%; left: 20%; }
        .firework-2 { top: 30%; right: 25%; animation-delay: 0.7s; }
        .firework-3 { top: 60%; left: 35%; animation-delay: 1.4s; }

        .firework-particle:nth-child(1) { background: #FFD700; --tx: 50px; --ty: -50px; animation-delay: 0s; }
        .firework-particle:nth-child(2) { background: #FF6B6B; --tx: 70px; --ty: 0px; animation-delay: 0.05s; }
        .firework-particle:nth-child(3) { background: #4ECDC4; --tx: 50px; --ty: 50px; animation-delay: 0.1s; }
        .firework-particle:nth-child(4) { background: #A855F7; --tx: 0px; --ty: 70px; animation-delay: 0.15s; }
        .firework-particle:nth-child(5) { background: #F472B6; --tx: -50px; --ty: 50px; animation-delay: 0.2s; }
        .firework-particle:nth-child(6) { background: #22D3EE; --tx: -70px; --ty: 0px; animation-delay: 0.25s; }
        .firework-particle:nth-child(7) { background: #FFD93D; --tx: -50px; --ty: -50px; animation-delay: 0.3s; }
        .firework-particle:nth-child(8) { background: #FF9F1C; --tx: 0px; --ty: -70px; animation-delay: 0.35s; }

        .planet {
            position: fixed;
            pointer-events: none;
            z-index: 2;
        }

        .planet-body {
            border-radius: 50%;
            box-shadow: 
                inset -20px -20px 40px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 255, 255, 0.2);
        }

        .planet-ring {
            position: absolute;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: rotateX(70deg);
            top: 50%;
            left: 50%;
            transform-origin: center;
        }

        .planet-1 { top: 12%; right: 10%; animation: planet-float 6s ease-in-out infinite; }
        .planet-1 .planet-body { width: 80px; height: 80px; background: linear-gradient(135deg, #FF6B6B, #FFD93D); }
        .planet-1 .planet-ring { width: 140px; height: 40px; margin-left: -70px; margin-top: -20px; border-color: rgba(255, 107, 107, 0.5); }

        .planet-2 { bottom: 18%; left: 8%; animation: planet-float 5s ease-in-out infinite reverse; }
        .planet-2 .planet-body { width: 60px; height: 60px; background: linear-gradient(135deg, #4ECDC4, #A855F7); }

        @keyframes planet-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .game-container {
            background: linear-gradient(145deg, rgba(30, 25, 60, 0.95), rgba(20, 15, 40, 0.98));
            border-radius: 32px;
            padding: 45px;
            max-width: 480px;
            width: 92%;
            box-shadow: 
                0 0 40px rgba(168, 85, 247, 0.2),
                0 0 80px rgba(236, 72, 153, 0.1),
                inset 0 2px 0 rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(168, 85, 247, 0.4);
            position: relative;
            z-index: 10;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 34px;
            background: linear-gradient(45deg, #FFD700, #FF6B6B, #4ECDC4, #A855F7, #F472B6, #FFD700);
            background-size: 400% 400%;
            z-index: -1;
            animation: border-glow 5s ease infinite;
            opacity: 0.6;
        }

        @keyframes border-glow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .title {
            text-align: center;
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 32px;
            letter-spacing: 6px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF6347, #FF69B4, #9370DB, #00CED1, #FFD700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: title-rainbow 3s ease infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        @keyframes title-rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .title span {
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .demo-box {
            padding: 32px;
            background: linear-gradient(145deg, rgba(40, 35, 70, 0.9), rgba(30, 25, 50, 0.95));
            border-radius: 24px;
            border: 3px solid rgba(168, 85, 247, 0.3);
            text-align: center;
            color: #E0E7FF;
            font-size: 16px;
        }

        .scheme-name {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #FFD700;
            margin-bottom: 26px;
            padding: 18px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
            border-radius: 16px;
            border: 3px solid rgba(255, 215, 0, 0.4);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .demo-box p {
            margin: 18px 0;
            font-size: 17px;
            font-weight: 600;
        }
    </style>
</head>
<body>
