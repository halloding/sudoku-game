<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软萌治愈风 - 云朵方案三：极简奶云</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'M PLUS Rounded 1c', 'PingFang SC', sans-serif;
            overflow: hidden;
            position: relative;
            
            background: linear-gradient(180deg, #FFF8F0 0%, #FFFAF5 50%, #F5FFF8 100%);
        }

        /* 柔和光斑 */
        .glow-spots { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .glow { position: absolute; border-radius: 50%; filter: blur(50px); opacity: 0.45; }
        .glow-1 { width: 350px; height: 250px; background: radial-gradient(ellipse, rgba(255, 220, 245, 0.9), transparent); top: 3%; left: 8%; }
        .glow-2 { width: 300px; height: 220px; background: radial-gradient(ellipse, rgba(220, 240, 255, 0.85), transparent); top: 35%; right: 5%; }
        .glow-3 { width: 320px; height: 240px; background: radial-gradient(ellipse, rgba(240, 255, 235, 0.85), transparent); bottom: 8%; left: 15%; }

        /* 金色星星 */
        .star {
            position: fixed;
            font-size: 28px;
            pointer-events: none;
            z-index: 1;
            animation: twinkle 2.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.9));
            color: #FFD700;
        }
        .star:nth-child(1) { top: 8%; left: 12%; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; right: 15%; animation-delay: 0.8s; font-size: 24px; }
        .star:nth-child(3) { bottom: 38%; left: 20%; animation-delay: 1.6s; font-size: 26px; }
        .star:nth-child(4) { top: 40%; right: 30%; animation-delay: 2.2s; font-size: 20px; }
        .star:nth-child(5) { bottom: 20%; right: 18%; animation-delay: 0.4s; font-size: 22px; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 云朵 - 从左侧滑入 + 上下浮动 */
        .cloud { position: fixed; pointer-events: none; z-index: 0; }
        .cloud-body { position: relative; width: 180px; height: 70px; }
        .cloud-body::before, .cloud-body::after, .cloud-part { content: ''; position: absolute; background: linear-gradient(180deg, #FFFFFF 50%, #FAFAFA 100%); border-radius: 50px; box-shadow: inset -8px -8px 20px rgba(200, 190, 180, 0.05), 0 18px 40px rgba(200, 190, 180, 0.3); }
        
        .cloud-1 .c1 { width: 72px; height: 72px; top: -34px; left: 10px; }
        .cloud-1 .c2 { width: 92px; height: 84px; top: -44px; left: 42px; }
        .cloud-1 .c3 { width: 62px; height: 56px; top: -24px; left: 104px; }
        .cloud-1 .c4 { width: 52px; height: 46px; top: -14px; left: 140px; }
        .cloud-1 .c5 { width: 82px; height: 52px; top: -10px; left: 54px; border-radius: 36px; }
        .cloud-1 { top: 5%; left: -250px; animation: cloud-move-1 58s linear infinite; filter: drop-shadow(0 22px 45px rgba(200, 190, 180, 0.35)); }
        
        @keyframes cloud-move-1 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-20px); }
            50% { transform: translateY(25px); }
            75% { transform: translateY(-22px); }
            100% { left: 120vw; transform: translateY(15px); }
        }
        
        .cloud-2 .c1 { width: 66px; height: 66px; top: -30px; left: 6px; }
        .cloud-2 .c2 { width: 84px; height: 76px; top: -38px; left: 36px; }
        .cloud-2 .c3 { width: 56px; height: 50px; top: -20px; left: 92px; }
        .cloud-2 .c4 { width: 46px; height: 40px; top: -10px; left: 124px; }
        .cloud-2 .c5 { width: 74px; height: 46px; top: -6px; left: 46px; border-radius: 30px; }
        .cloud-2 { top: 20%; left: -250px; animation: cloud-move-2 62s linear infinite; animation-delay: -16s; }
        
        @keyframes cloud-move-2 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-25px); }
            50% { transform: translateY(20px); }
            75% { transform: translateY(-18px); }
            100% { left: 120vw; transform: translateY(22px); }
        }
        
        .cloud-3 .c1 { width: 70px; height: 70px; top: -32px; left: 8px; }
        .cloud-3 .c2 { width: 88px; height: 80px; top: -40px; left: 40px; }
        .cloud-3 .c3 { width: 60px; height: 54px; top: -22px; left: 98px; }
        .cloud-3 .c4 { width: 50px; height: 44px; top: -12px; left: 132px; }
        .cloud-3 .c5 { width: 78px; height: 50px; top: -8px; left: 50px; border-radius: 34px; }
        .cloud-3 { top: 8%; right: -250px; left: auto; animation: cloud-move-3 60s linear infinite; animation-delay: -30s; }
        
        @keyframes cloud-move-3 {
            0% { right: -250px; left: auto; transform: translateY(0); }
            25% { transform: translateY(-22px); }
            50% { transform: translateY(18px); }
            75% { transform: translateY(-25px); }
            100% { right: 120vw; left: auto; transform: translateY(12px); }
        }
        
        .cloud-4 .c1 { width: 74px; height: 74px; top: -35px; left: 12px; }
        .cloud-4 .c2 { width: 90px; height: 84px; top: -44px; left: 44px; }
        .cloud-4 .c3 { width: 64px; height: 58px; top: -24px; left: 108px; }
        .cloud-4 .c4 { width: 54px; height: 48px; top: -14px; left: 146px; }
        .cloud-4 .c5 { width: 80px; height: 52px; top: -10px; left: 56px; border-radius: 35px; }
        .cloud-4 { top: 45%; left: -250px; animation: cloud-move-4 64s linear infinite; animation-delay: -44s; }
        
        @keyframes cloud-move-4 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-18px); }
            50% { transform: translateY(22px); }
            75% { transform: translateY(-20px); }
            100% { left: 120vw; transform: translateY(18px); }
        }
        
        .cloud-5 .c1 { width: 68px; height: 68px; top: -30px; left: 8px; }
        .cloud-5 .c2 { width: 82px; height: 76px; top: -38px; left: 38px; }
        .cloud-5 .c3 { width: 56px; height: 50px; top: -20px; left: 90px; }
        .cloud-5 .c4 { width: 46px; height: 40px; top: -10px; left: 120px; }
        .cloud-5 .c5 { width: 72px; height: 46px; top: -6px; left: 46px; border-radius: 30px; }
        .cloud-5 { top: 35%; left: -250px; animation: cloud-move-5 59s linear infinite; animation-delay: -20s; }
        
        @keyframes cloud-move-5 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-22px); }
            50% { transform: translateY(25px); }
            75% { transform: translateY(-18px); }
            100% { left: 120vw; transform: translateY(20px); }
        }
        
        .cloud-6 .c1 { width: 70px; height: 70px; top: -32px; left: 10px; }
        .cloud-6 .c2 { width: 86px; height: 78px; top: -40px; left: 40px; }
        .cloud-6 .c3 { width: 58px; height: 52px; top: -21px; left: 96px; }
        .cloud-6 .c4 { width: 48px; height: 42px; top: -11px; left: 128px; }
        .cloud-6 .c5 { width: 76px; height: 48px; top: -7px; left: 48px; border-radius: 32px; }
        .cloud-6 { bottom: 15%; left: -250px; animation: cloud-move-6 63s linear infinite; animation-delay: -35s; }
        
        @keyframes cloud-move-6 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-20px); }
            50% { transform: translateY(22px); }
            75% { transform: translateY(-25px); }
            100% { left: 120vw; transform: translateY(15px); }
        }
        
        .cloud-7 .c1 { width: 66px; height: 66px; top: -28px; left: 6px; }
        .cloud-7 .c2 { width: 80px; height: 74px; top: -36px; left: 34px; }
        .cloud-7 .c3 { width: 54px; height: 48px; top: -18px; left: 86px; }
        .cloud-7 .c4 { width: 44px; height: 38px; top: -9px; left: 114px; }
        .cloud-7 .c5 { width: 70px; height: 44px; top: -5px; left: 42px; border-radius: 28px; }
        .cloud-7 { bottom: 25%; left: -250px; animation: cloud-move-7 61s linear infinite; animation-delay: -50s; }
        
        @keyframes cloud-move-7 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-25px); }
            50% { transform: translateY(20px); }
            75% { transform: translateY(-22px); }
            100% { left: 120vw; transform: translateY(18px); }
        }
        
        .cloud-8 .c1 { width: 68px; height: 68px; top: -30px; left: 8px; }
        .cloud-8 .c2 { width: 84px; height: 76px; top: -38px; left: 38px; }
        .cloud-8 .c3 { width: 56px; height: 50px; top: -19px; left: 92px; }
        .cloud-8 .c4 { width: 46px; height: 40px; top: -10px; left: 124px; }
        .cloud-8 .c5 { width: 74px; height: 46px; top: -6px; left: 46px; border-radius: 30px; }
        .cloud-8 { top: 62%; left: -250px; animation: cloud-move-8 60s linear infinite; animation-delay: -24s; }
        
        @keyframes cloud-move-8 {
            0% { left: -250px; transform: translateY(0); }
            25% { transform: translateY(-18px); }
            50% { transform: translateY(25px); }
            75% { transform: translateY(-20px); }
            100% { left: 120vw; transform: translateY(22px); }
        }

        /* 奶油粉爱心 */
        .heart-burst { position: fixed; pointer-events: none; z-index: 2; width: 100%; height: 100%; top: 0; left: 0; }
        
        .burst-heart {
            position: absolute;
            font-size: 40px;
            filter: drop-shadow(0 5px 15px rgba(255, 220, 230, 0.9));
            animation: burst 2.3s ease-out infinite;
            transform-origin: center;
            color: #FFD1DC;
        }
        
        .burst-heart:nth-child(1) { left: 8%; top: 10%; animation-delay: 0s; }
        .burst-heart:nth-child(2) { left: 20%; top: 40%; animation-delay: 0.3s; font-size: 36px; }
        .burst-heart:nth-child(3) { left: 35%; top: 20%; animation-delay: 0.6s; font-size: 44px; }
        .burst-heart:nth-child(4) { left: 50%; top: 50%; animation-delay: 0.9s; font-size: 32px; }
        .burst-heart:nth-child(5) { left: 62%; top: 15%; animation-delay: 1.2s; font-size: 42px; }
        .burst-heart:nth-child(6) { left: 75%; top: 45%; animation-delay: 1.5s; font-size: 34px; }
        .burst-heart:nth-child(7) { left: 88%; top: 25%; animation-delay: 1.8s; font-size: 38px; }
        .burst-heart:nth-child(8) { left: 12%; top: 70%; animation-delay: 0.45s; font-size: 32px; }
        .burst-heart:nth-child(9) { left: 45%; top: 75%; animation-delay: 0.75s; font-size: 36px; }
        .burst-heart:nth-child(10) { left: 78%; top: 72%; animation-delay: 1.05s; font-size: 40px; }
        
        @keyframes burst {
            0% { opacity: 0; transform: translateY(40px) scale(0.1) rotate(-35deg); }
            20% { opacity: 1; transform: translateY(0) scale(1.6) rotate(20deg); }
            40% { transform: translateY(-25px) scale(1.2) rotate(-18deg); }
            60% { opacity: 1; transform: translateY(-10px) scale(1.35) rotate(15deg); }
            80% { opacity: 0.5; transform: translateY(-15px) scale(0.8) rotate(-8deg); }
            100% { opacity: 0; transform: translateY(-55px) scale(0.2) rotate(0deg); }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 52px;
            padding: 55px;
            max-width: 480px;
            width: 92%;
            box-shadow: 0 40px 100px rgba(200, 180, 170, 0.28), 0 22px 50px rgba(200, 180, 170, 0.16), inset 0 3px 0 rgba(255, 255, 255, 1);
            border: 4px solid rgba(255, 235, 245, 0.85);
            position: relative;
            z-index: 10;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 2px solid rgba(255, 210, 225, 0.55);
            border-radius: 44px;
            pointer-events: none;
        }

        .game-container::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            width: 10px;
            height: 10px;
            background: rgba(255, 200, 215, 0.8);
            border-radius: 50%;
            box-shadow: calc(100% - 16px) 0 0 rgba(255, 200, 215, 0.8), 0 calc(100% - 16px) 0 rgba(255, 200, 215, 0.8), calc(100% - 16px) calc(100% - 16px) 0 rgba(255, 200, 215, 0.8);
            pointer-events: none;
        }

        .title {
            text-align: center;
            font-size: 38px;
            font-weight: 700;
            color: #A89080;
            margin: 28px 0 28px;
            letter-spacing: 10px;
        }

        .title span { color: #FFD4D4; text-shadow: 2px 2px 6px rgba(255, 180, 180, 0.5); }

        .demo-box {
            padding: 30px;
            background: linear-gradient(145deg, #FFFFFF, #FFFCFA);
            border-radius: 30px;
            border: 3px solid rgba(255, 235, 245, 0.65);
            text-align: center;
            color: #A89080;
            font-size: 16px;
        }

        .scheme-name {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #E8A0A8;
            margin-bottom: 22px;
            padding: 15px;
            background: linear-gradient(135deg, #FFF8F5, #F5FFF8);
            border-radius: 18px;
            border: 3px solid rgba(255, 210, 225, 0.5);
        }
        
        .demo-box p { margin: 15px 0; font-size: 17px; }
    </style>
</head>
<body>
    <div class="glow-spots">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>
    
    <span class="star">✦</span>
    <span class="star">✦</span>
    <span class="star">✦</span>
    <span class="star">✦</span>
    <span class="star">✦</span>
    
    <div class="cloud cloud-1"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-2"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-3"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-4"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-5"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-6"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-7"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    <div class="cloud cloud-8"><div class="cloud-body"><span class="cloud-part c1"></span><span class="cloud-part c2"></span><span class="cloud-part c3"></span><span class="cloud-part c4"></span><span class="cloud-part c5"></span></div></div>
    
    <div class="heart-burst">
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
        <span class="burst-heart">♡</span>
    </div>

    <div class="game-container">
        <h1 class="title">数<span>独</span></h1>
        <div class="scheme-name">☁ 方案三：极简奶白云+10奶油粉爱心 ☁</div>
        <div class="demo-box">
            <p>☁ 8个云朵从左侧滑入+上下浮动</p>
            <p>✦ 金色星星闪烁</p>
            <p>♡ 奶油粉爱心喷涌惊喜</p>
            <p>✨ 柔和光斑背景</p>
        </div>
    </div>
</body>
</html>
