<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷调科技风 - 方案三：深空探索</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', 'Microsoft YaHei', monospace;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #030712 0%, #0B1120 50%, #020617 100%);
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #E0F2FE;
            border-radius: 50%;
            box-shadow: 0 0 6px #E0F2FE, 0 0 12px rgba(224, 242, 254, 0.5);
            animation: star-twinkle 2s ease-in-out infinite;
        }

        @keyframes star-twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
        .star:nth-child(2) { top: 25%; left: 70%; animation-delay: 0.3s; width: 2px; height: 2px; }
        .star:nth-child(3) { top: 40%; left: 30%; animation-delay: 0.6s; width: 4px; height: 4px; }
        .star:nth-child(4) { top: 55%; left: 85%; animation-delay: 0.9s; }
        .star:nth-child(5) { top: 70%; left: 20%; animation-delay: 1.2s; width: 2px; height: 2px; }
        .star:nth-child(6) { top: 85%; left: 60%; animation-delay: 1.5s; width: 5px; height: 5px; }
        .star:nth-child(7) { top: 15%; left: 45%; animation-delay: 0.2s; }
        .star:nth-child(8) { top: 35%; left: 10%; animation-delay: 0.5s; width: 3px; height: 3px; }
        .star:nth-child(9) { top: 65%; left: 75%; animation-delay: 0.8s; }
        .star:nth-child(10) { top: 80%; left: 40%; animation-delay: 1.1s; width: 2px; height: 2px; }
        .star:nth-child(11) { top: 5%; left: 80%; animation-delay: 1.4s; width: 4px; height: 4px; }
        .star:nth-child(12) { top: 45%; left: 5%; animation-delay: 1.7s; }
        .star:nth-child(13) { top: 90%; left: 90%; animation-delay: 0.4s; width: 3px; height: 3px; }
        .star:nth-child(14) { top: 30%; left: 55%; animation-delay: 0.7s; }
        .star:nth-child(15) { top: 75%; left: 35%; animation-delay: 1s; width: 2px; height: 2px; }
        .star:nth-child(16) { top: 20%; left: 95%; animation-delay: 1.3s; }
        .star:nth-child(17) { top: 50%; left: 48%; animation-delay: 1.6s; width: 5px; height: 5px; }
        .star:nth-child(18) { top: 88%; left: 8%; animation-delay: 0.1s; }
        .star:nth-child(19) { top: 12%; left: 50%; animation-delay: 0.6s; width: 2px; height: 2px; }
        .star:nth-child(20) { top: 58%; left: 65%; animation-delay: 1.1s; }

        .nebula {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: nebula-drift 20s ease-in-out infinite;
        }

        @keyframes nebula-drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.1); }
            66% { transform: translate(-15px, 25px) scale(0.95); }
        }

        .nebula:nth-child(1) {
            top: 10%;
            left: 10%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.4) 0%, transparent 70%);
        }
        .nebula:nth-child(2) {
            top: 60%;
            right: 10%;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.4) 0%, transparent 70%);
            animation-delay: -7s;
        }
        .nebula:nth-child(3) {
            bottom: 10%;
            left: 40%;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.3) 0%, transparent 70%);
            animation-delay: -14s;
        }

        .shooting-star {
            position: fixed;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #E0F2FE, transparent);
            pointer-events: none;
            z-index: 2;
            animation: shoot 3s ease-in-out infinite;
        }

        @keyframes shoot {
            0% { 
                transform: translateX(0) translateY(0) rotate(-45deg); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateX(-300px) translateY(300px) rotate(-45deg); 
                opacity: 0; 
            }
        }

        .shooting-star:nth-child(1) { top: 15%; left: 60%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 30%; left: 80%; animation-delay: 4s; }
        .shooting-star:nth-child(3) { top: 10%; left: 40%; animation-delay: 7s; }
        .shooting-star:nth-child(4) { top: 50%; left: 70%; animation-delay: 10s; }

        .orbit-ring {
            position: fixed;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: orbit-rotate 30s linear infinite;
        }

        @keyframes orbit-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .orbit-ring:nth-child(1) {
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            margin-top: -200px;
            margin-left: -200px;
            border-color: rgba(56, 189, 248, 0.2);
        }
        .orbit-ring:nth-child(2) {
            top: 50%;
            left: 50%;
            width: 550px;
            height: 550px;
            margin-top: -275px;
            margin-left: -275px;
            border-color: rgba(129, 140, 248, 0.2);
            animation-direction: reverse;
            animation-duration: 40s;
        }

        .planet {
            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            box-shadow: 0 0 15px currentColor;
        }

        .planet:nth-child(1) {
            top: 50%;
            left: 50%;
            margin-top: -12.5px;
            margin-left: 200px;
            background: radial-gradient(circle at 30% 30%, #38BDF8, #0369A1);
            color: #38BDF8;
            animation: planet-orbit1 15s linear infinite;
        }
        .planet:nth-child(2) {
            top: 50%;
            left: 50%;
            margin-top: -275px;
            margin-left: -12.5px;
            background: radial-gradient(circle at 30% 30%, #818CF8, #4338CA);
            color: #818CF8;
            animation: planet-orbit2 20s linear infinite;
        }
        .planet:nth-child(3) {
            top: 50%;
            left: 50%;
            margin-top: 275px;
            margin-left: -12.5px;
            background: radial-gradient(circle at 30% 30%, #22C55E, #15803D);
            color: #22C55E;
            animation: planet-orbit3 25s linear infinite;
        }

        @keyframes planet-orbit1 {
            0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
        }
        @keyframes planet-orbit2 {
            0% { transform: rotate(0deg) translateY(-275px) rotate(0deg); }
            100% { transform: rotate(360deg) translateY(-275px) rotate(-360deg); }
        }
        @keyframes planet-orbit3 {
            0% { transform: rotate(0deg) translateY(275px) rotate(0deg); }
            100% { transform: rotate(360deg) translateY(275px) rotate(-360deg); }
        }

        .game-container {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(3, 7, 18, 0.98));
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 92%;
            box-shadow: 
                0 0 30px rgba(56, 189, 248, 0.15),
                0 0 60px rgba(129, 140, 248, 0.1),
                inset 0 2px 0 rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(56, 189, 248, 0.3);
            position: relative;
            z-index: 10;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 15%;
            right: 15%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #38BDF8, #818CF8, transparent);
            animation: border-pulse 3s ease-in-out infinite;
        }

        @keyframes border-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .game-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.08) 0%, transparent 50%, rgba(129, 140, 248, 0.08) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #38BDF8;
            margin-bottom: 30px;
            letter-spacing: 8px;
            text-shadow: 
                0 0 10px rgba(56, 189, 248, 0.8),
                0 0 20px rgba(56, 189, 248, 0.5),
                0 0 30px rgba(129, 140, 248, 0.3);
            animation: title-glow 2.5s ease-in-out infinite;
        }

        .title span {
            color: #818CF8;
            text-shadow: 
                0 0 10px rgba(129, 140, 248, 0.8),
                0 0 20px rgba(129, 140, 248, 0.5);
        }

        @keyframes title-glow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(56, 189, 248, 0.8), 0 0 20px rgba(129, 140, 248, 0.5); 
            }
            50% { 
                text-shadow: 0 0 15px rgba(56, 189, 248, 1), 0 0 30px rgba(129, 140, 248, 0.7); 
            }
        }

        .demo-box {
            padding: 30px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(3, 7, 18, 0.95));
            border-radius: 10px;
            border: 2px solid rgba(56, 189, 248, 0.25);
            text-align: center;
            color: #E2E8F0;
            font-size: 15px;
        }

        .scheme-name {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #38BDF8;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(56, 189, 248, 0.08);
            border-radius: 8px;
            border: 2px solid rgba(129, 140, 248, 0.3);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
            letter-spacing: 3px;
        }
        
        .demo-box p {
            margin: 16px 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <div class="nebula"></div>
    <div class="nebula"></div>
    
    <div class="stars-bg">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>
    
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    
    <div class="orbit-ring"></div>
    <div class="orbit-ring"></div>
    
    <div class="planet"></div>
    <div class="planet"></div>
    <div class="planet"></div>

    <div class="game-container">
        <h1 class="title">SUDOKU</h1>
        <div class="scheme-name">🌌 方案三：深空探索 🌌</div>
        <div class="demo-box">
            <p>⭐ 闪烁群星背景</p>
            <p>🌫️ 流动星云光晕</p>
            <p>☄️ 流星划过效果</p>
            <p>🪐 行星轨道旋转</p>

        </div>
    </div>
</body>
</html>
