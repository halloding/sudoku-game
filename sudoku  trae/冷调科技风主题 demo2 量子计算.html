<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷调科技风 - 方案二：量子计算</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', 'Microsoft YaHei', monospace;
            overflow: hidden;
            position: relative;
            background: #050816;
        }

        .quantum-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .quantum-wave {
            position: absolute;
            border: 2px solid rgba(139, 92, 246, 0.4);
            border-radius: 50%;
            animation: quantum-expand 4s ease-out infinite;
        }

        @keyframes quantum-expand {
            0% { 
                transform: scale(0); 
                opacity: 1; 
            }
            100% { 
                transform: scale(3); 
                opacity: 0; 
            }
        }

        .quantum-wave:nth-child(1) { 
            top: 30%; left: 25%; animation-delay: 0s; 
        }
        .quantum-wave:nth-child(2) { 
            top: 60%; left: 75%; animation-delay: 1s; 
        }
        .quantum-wave:nth-child(3) { 
            top: 45%; left: 50%; animation-delay: 2s; 
        }
        .quantum-wave:nth-child(4) { 
            top: 70%; left: 30%; animation-delay: 3s; 
        }
        .quantum-wave:nth-child(5) { 
            top: 25%; left: 70%; animation-delay: 3.5s; 
        }

        .circuit-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .qubit {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #8B5CF6, #06B6D4);
            box-shadow: 
                0 0 20px #8B5CF6,
                0 0 40px rgba(139, 92, 246, 0.5),
                0 0 60px rgba(6, 182, 212, 0.3);
            pointer-events: none;
            z-index: 3;
            animation: qubit-pulse 2s ease-in-out infinite;
        }

        @keyframes qubit-pulse {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 
                    0 0 20px #8B5CF6,
                    0 0 40px rgba(139, 92, 246, 0.5);
            }
            50% { 
                transform: scale(1.3); 
                box-shadow: 
                    0 0 30px #8B5CF6,
                    0 0 60px rgba(139, 92, 246, 0.7),
                    0 0 90px rgba(6, 182, 212, 0.5);
            }
        }

        .qubit:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
        .qubit:nth-child(2) { top: 35%; right: 15%; animation-delay: 0.5s; }
        .qubit:nth-child(3) { top: 55%; left: 10%; animation-delay: 1s; }
        .qubit:nth-child(4) { top: 75%; right: 20%; animation-delay: 1.5s; }
        .qubit:nth-child(5) { top: 25%; left: 70%; animation-delay: 2s; }
        .qubit:nth-child(6) { top: 65%; left: 60%; animation-delay: 2.5s; }

        .entanglement-line {
            position: fixed;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8B5CF6, #06B6D4, transparent);
            pointer-events: none;
            z-index: 2;
            animation: entanglement-flow 3s linear infinite;
        }

        @keyframes entanglement-flow {
            0% { opacity: 0; }
            25% { opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }
        }

        .entanglement-line:nth-child(1) { 
            top: 20%; left: 25%; width: 25%; transform: rotate(15deg); animation-delay: 0s; 
        }
        .entanglement-line:nth-child(2) { 
            top: 40%; right: 30%; width: 20%; transform: rotate(-10deg); animation-delay: 1s; 
        }
        .entanglement-line:nth-child(3) { 
            top: 60%; left: 35%; width: 30%; transform: rotate(5deg); animation-delay: 2s; 
        }
        .entanglement-line:nth-child(4) { 
            top: 80%; right: 25%; width: 22%; transform: rotate(-15deg); animation-delay: 1.5s; 
        }

        .qubit-ring {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(6, 182, 212, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            animation: ring-rotate 8s linear infinite;
        }

        @keyframes ring-rotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .qubit-ring:nth-child(1) { 
            top: 10%; left: 80%; 
            border-color: rgba(139, 92, 246, 0.6);
        }
        .qubit-ring:nth-child(2) { 
            top: 85%; left: 15%; 
            border-color: rgba(6, 182, 212, 0.6);
            animation-delay: 2s;
        }
        .qubit-ring:nth-child(3) { 
            top: 50%; right: 8%; 
            border-color: rgba(139, 92, 246, 0.6);
            animation-delay: 4s;
        }

        .hexagon-pattern {
            position: fixed;
            width: 60px;
            height: 69px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.15;
        }

        .hexagon-pattern::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #8B5CF6;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: hexagon-pulse 4s ease-in-out infinite;
        }

        @keyframes hexagon-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .hexagon-pattern:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
        .hexagon-pattern:nth-child(2) { top: 5%; right: 5%; animation-delay: 1s; }
        .hexagon-pattern:nth-child(3) { bottom: 5%; left: 5%; animation-delay: 2s; }
        .hexagon-pattern:nth-child(4) { bottom: 5%; right: 5%; animation-delay: 3s; }

        .game-container {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(5, 8, 22, 0.98));
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 92%;
            box-shadow: 
                0 0 30px rgba(139, 92, 246, 0.15),
                0 0 60px rgba(6, 182, 212, 0.1),
                inset 0 2px 0 rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(139, 92, 246, 0.3);
            position: relative;
            z-index: 10;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 15%;
            right: 15%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #8B5CF6, #06B6D4, transparent);
            animation: border-pulse 3s ease-in-out infinite;
        }

        @keyframes border-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .game-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08) 0%, transparent 50%, rgba(6, 182, 212, 0.08) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #8B5CF6;
            margin-bottom: 30px;
            letter-spacing: 8px;
            text-shadow: 
                0 0 10px rgba(139, 92, 246, 0.8),
                0 0 20px rgba(139, 92, 246, 0.5),
                0 0 30px rgba(6, 182, 212, 0.3);
            animation: title-glow 2.5s ease-in-out infinite;
        }

        .title span {
            color: #06B6D4;
            text-shadow: 
                0 0 10px rgba(6, 182, 212, 0.8),
                0 0 20px rgba(6, 182, 212, 0.5);
        }

        @keyframes title-glow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(139, 92, 246, 0.8), 0 0 20px rgba(6, 182, 212, 0.5); 
            }
            50% { 
                text-shadow: 0 0 15px rgba(6, 182, 212, 1), 0 0 30px rgba(139, 92, 246, 0.7); 
            }
        }

        .demo-box {
            padding: 30px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(5, 8, 22, 0.95));
            border-radius: 10px;
            border: 2px solid rgba(139, 92, 246, 0.25);
            text-align: center;
            color: #E2E8F0;
            font-size: 15px;
        }

        .scheme-name {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #8B5CF6;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(139, 92, 246, 0.08);
            border-radius: 8px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.6);
            letter-spacing: 3px;
        }
        
        .demo-box p {
            margin: 16px 0;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="quantum-bg">
        <div class="quantum-wave"></div>
        <div class="quantum-wave"></div>
        <div class="quantum-wave"></div>
        <div class="quantum-wave"></div>
        <div class="quantum-wave"></div>
    </div>
    
    <div class="circuit-grid"></div>
    
    <div class="entanglement-line"></div>
    <div class="entanglement-line"></div>
    <div class="entanglement-line"></div>
    <div class="entanglement-line"></div>
    
    <div class="qubit"></div>
    <div class="qubit"></div>
    <div class="qubit"></div>
    <div class="qubit"></div>
    <div class="qubit"></div>
    <div class="qubit"></div>
    
    <div class="qubit-ring"></div>
    <div class="qubit-ring"></div>
    <div class="qubit-ring"></div>
    
    <div class="hexagon-pattern"></div>
    <div class="hexagon-pattern"></div>
    <div class="hexagon-pattern"></div>
    <div class="hexagon-pattern"></div>

    <div class="game-container">
        <h1 class="title">SUDOKU</h1>
        <div class="scheme-name">⚛ 方案二：量子计算 ⚛</div>
        <div class="demo-box">
            <p>⚛ 量子波动扩散</p>
            <p>🔌 电路网格背景</p>
            <p>🔮 量子比特脉动</p>
            <p>🔗 量子纠缠连线</p>
            <p>⬡ 六边量子位环</p>
        </div>
    </div>
</body>
</html>
